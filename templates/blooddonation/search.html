{% extends 'blooddonation/base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-10">
    <div class="text-center mb-12">
        <h2 class="text-4xl font-black text-slate-900 tracking-tight mb-3">Find a <span class="text-red-600">Donor</span></h2>
        <p class="text-slate-500 font-medium">Select the blood group and location to view available heroes in your area.</p>
    </div>

    <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-red-500 to-rose-500 rounded-[2rem] blur opacity-10 group-hover:opacity-20 transition duration-1000"></div>
        
        <form method="get" action="{% url 'donor_list' %}" class="relative bg-white border border-slate-100 rounded-[2rem] p-8 md:p-12 shadow-xl shadow-slate-200/50">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                
                <div class="space-y-3">
                    <label for="blood_group" class="block text-sm font-bold text-slate-700 uppercase tracking-widest ml-1">
                        Blood Group
                    </label>
                    <div class="relative">
                        <select id="blood_group" name="blood_group" 
                            class="w-full bg-slate-50 border-2 border-slate-100 text-slate-900 font-semibold text-lg rounded-2xl focus:ring-4 focus:ring-red-100 focus:border-red-500 block p-4 appearance-none transition-all cursor-pointer">
                            <option value="">Any Blood Group</option>
                            {% for value, label in blood_groups %}
                                <option value="{{ value }}" {% if selected_blood_group == value %}selected{% endif %}>
                                    {{ label }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <label for="city" class="block text-sm font-bold text-slate-700 uppercase tracking-widest ml-1">
                        Location / City
                    </label>
                    <div class="relative">
                        <select id="city" name="city" 
                            class="w-full bg-slate-50 border-2 border-slate-100 text-slate-900 font-semibold text-lg rounded-2xl focus:ring-4 focus:ring-red-100 focus:border-red-500 block p-4 appearance-none transition-all cursor-pointer">
                            <option value="">All Available Cities</option>
                            {% for city_name in cities %}
                                <option value="{{ city_name }}" {% if selected_city == city_name %}selected{% endif %}>
                                    {{ city_name }}
                                </option>
                            {% endfor %}
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </div>
                    </div>
                </div>

            </div>

            <div class="mt-10">
                <button type="submit" class="w-full group relative flex items-center justify-center gap-3 px-8 py-5 bg-slate-900 text-white font-black text-xl rounded-2xl transition-all hover:bg-red-600 hover:shadow-2xl hover:shadow-red-200 active:scale-[0.98]">
                    <span>Search For Donors</span>
                    <svg class="w-6 h-6 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </button>
            </div>
        </form>
    </div>

    <div class="mt-8 flex justify-center gap-8 text-slate-400 text-sm font-bold uppercase tracking-tighter">
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-green-500 rounded-full"></span> 
            Verified Donors
        </div>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 bg-blue-500 rounded-full"></span> 
            Real-time Updates
        </div>
    </div>
</div>
{% endblock %}
